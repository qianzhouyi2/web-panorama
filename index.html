<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>360° 全景照片查看器</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔭</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <p>加载全景图中...</p>
  </div>

  <!-- Three.js Canvas Container -->
  <div id="canvas-container"></div>

  <!-- Hint: Drag to rotate -->
  <div id="hint">拖拽旋转 / 滚轮缩放 / 手机陀螺仪</div>

  <!-- Gyroscope Indicator -->
  <div id="gyro-indicator" style="display:none">
    <div class="gyro-ring"></div>
  </div>

  <!-- Control Bar -->
  <div id="controls">
    <button id="btn-upload" title="上传全景图">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </button>
    <button id="btn-auto-rotate" title="自动旋转">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
    <button id="btn-gyroscope" title="陀螺仪模式（手机端）">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2 L12 6"/>
        <path d="M12 18 L12 22"/>
        <path d="M4.93 4.93 L7.76 7.76"/>
        <path d="M16.24 16.24 L19.07 19.07"/>
        <path d="M2 12 L6 12"/>
        <path d="M18 12 L22 12"/>
        <path d="M4.93 19.07 L7.76 16.24"/>
        <path d="M16.24 7.76 L19.07 4.93"/>
        <circle cx="12" cy="12" r="3.5"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
      </svg>
    </button>
    <button id="btn-zoom-in" title="放大">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="11" y1="8" x2="11" y2="14"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </button>
    <button id="btn-zoom-out" title="缩小">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </button>
    <button id="btn-reset" title="重置视角">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
    </button>
    <button id="btn-fullscreen" title="全屏">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 3 21 3 21 9"/>
        <polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/>
        <line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
    </button>
  </div>

  <input type="file" id="file-input" accept="image/*" style="display:none">

  <!-- Three.js Import Map -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="js/viewer.js"></script>
</body>
</html>
